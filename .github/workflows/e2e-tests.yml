name: E2E Tests

on:
  push:
    branches: [main]
    paths:
      - 'claude-remote-control/packages/cli/**'
      - 'claude-remote-control/packages/hooks/**'
      - 'claude-remote-control/apps/agent/**'
      - '.github/workflows/e2e-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'claude-remote-control/packages/cli/**'
      - 'claude-remote-control/packages/hooks/**'
      - 'claude-remote-control/apps/agent/**'
      - '.github/workflows/e2e-tests.yml'

jobs:
  e2e:
    name: E2E Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: claude-remote-control

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Install tmux (required for E2E tests)
      - name: Install tmux (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install tmux (macOS)
        if: runner.os == 'macOS'
        run: brew install tmux

      - name: Verify tmux installation
        run: tmux -V

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          NEON_AUTH_BASE_URL: https://auth.example.com

      # Run unit tests first (fast feedback)
      - name: Run unit tests
        run: bun run test

      # Run E2E tests
      - name: Run E2E tests
        run: bun run --filter 247-cli test:e2e
        env:
          CI: true

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs-${{ matrix.os }}
          path: |
            claude-remote-control/packages/cli/tests/e2e/logs/
          retention-days: 7
